server {
    listen 80;
    listen 443 ssl http2;
    server_name test.yukimart.io.vn;

    # BT Panel should manage these certificate paths if the site already uses SSL.
    ssl_certificate /www/server/panel/vhost/cert/test.yukimart.io.vn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/test.yukimart.io.vn/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
