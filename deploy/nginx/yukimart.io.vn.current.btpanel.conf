server {
    listen 80;
    listen [::]:80;
    server_name yukimart.io.vn test.yukimart.io.vn;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:18000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location = /api {
        proxy_pass http://127.0.0.1:18000/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location ^~ /sanctum/ {
        proxy_pass http://127.0.0.1:18000/sanctum/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location ^~ /broadcasting/ {
        proxy_pass http://127.0.0.1:18000/broadcasting/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location ^~ /storage/ {
        proxy_pass http://127.0.0.1:18000/storage/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location ^~ /docs {
        proxy_pass http://127.0.0.1:18000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /vendor {
        proxy_pass http://127.0.0.1:18000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /www/wwwroot/yukimart.io.vn;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ^~ /assets/ {
        root /www/wwwroot/yukimart.io.vn;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    access_log /www/wwwlogs/yukimart.io.vn.log;
    error_log /www/wwwlogs/yukimart.io.vn.error.log;

    access_log syslog:server=unix:/tmp/bt-monitor.sock,nohostname,tag=2__access monitor;
    error_log syslog:server=unix:/tmp/bt-monitor.sock,nohostname,tag=2__error;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name yukimart.io.vn test.yukimart.io.vn;

    ssl_certificate /www/server/panel/vhost/cert/yukimart.io.vn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/yukimart.io.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

